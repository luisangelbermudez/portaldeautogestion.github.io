<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Dashboard de Usuario</title>
	<link rel="stylesheet" type="text/css" href="css/normalice.css">
	<link rel="stylesheet" type="text/css" href="css/estilo.css">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</head>
<body>

<div class="container mt-3">
    <div class="alert alert-info bg-primary-subtle text-center">
        <h1>Portal de Autogestión</h1>
    </div>

<nav class="navbar navbar-expand-sm bg-primary navbar-dark mb-5 rounded">
<div class="container-fluid">
<a class="navbar-brand" href="#">Portal</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav">
              <li class="nav-item">
                <a class="nav-link active" href="index.html">🏠 Inicio</a> </li>
             <li class="nav-item">
                <a class="nav-link active" href="login.html">🚪 Cerrar Sesión</a> </li>
            <li class="nav-item">
                <a class="nav-link active" href="ayuda.html">❓ Ayuda</a> </li>
            </ul>
</div>
</div>
</nav>

<!-- Carousel -->
<div id="demo" class="carousel slide" data-bs-ride="carousel">

<div class="carousel-indicators">
  <button type="button" data-bs-target="#demo" data-bs-slide-to="0" class="active"></button>
  <button type="button" data-bs-target="#demo" data-bs-slide-to="1"></button>
  <button type="button" data-bs-target="#demo" data-bs-slide-to="2"></button>
</div>

<div class="carousel-inner">
    <div class="carousel-item active">
        <img src="imagenes/portal1.JPG" class="d-block w-100" height="200">
    </div>

    <div class="carousel-item">
        <img src="imagenes/portal2.jpg" class="d-block w-100" height="200">
    </div>

    <div class="carousel-item">
        <img src="imagenes/portal3.JPG" class="d-block w-100" height="200">
    </div>
</div>

</div>

<div class="row">

<!-- PERFIL USUARIO -->

<div class="col-md-6 text-center">

<div class="card shadow p-4">

<img src="imagenes/avatar.JPG" class="rounded-circle mx-auto mb-3" width="150">

<h4><b>NOMBRE DEL TRABAJADOR</b></h4>

<p class="text-muted">Cargo</p>

<p>Tiempo en la compañía</p>

<hr>

<div class="bg-light p-2 rounded">
<b>Actualización HV</b><br>
<small>Última hace 1 año</small>
</div>

<hr>

<small>Fecha de último ingreso<br>
03/03/2026 21:47 p.m.</small>

</div>

</div>


<!-- CARTA LABORAL -->

<div class="col-md-6">

<div class="card shadow p-4">

<h4 class="text-center mb-4"><b>Carta laboral</b></h4>

<label class="form-label">Tipo de carta</label>

<select id="tipoCarta" class="form-select mb-3">

<option value="">Seleccionar...</option>

<option value="docs/carta1.pdf">Certificación laboral - todos</option>

<option value="docs/carta2.pdf">Certificación laboral - sin básico</option>

<option value="docs/carta3.pdf">Carta laboral con promedio extras</option>

</select>

<button class="btn btn-dark w-100 mb-3" onclick="generarCertificado()">
CONSULTAR
</button>

<!-- AREA RESULTADO -->

<div id="resultadoCertificado" class="text-center"></div>

</div>

</div>

</div>

</div>

<footer class="text-center mt-5 p-3 bg-light">
Portal de Autogestión - Sistema de gestión de solicitudes  
© 2026
</footer>

<script>

function generarCertificado(){

let tipoCarta = document.getElementById("tipoCarta").value;
let resultado = document.getElementById("resultadoCertificado");

if(tipoCarta === ""){
resultado.innerHTML = "<div class='alert alert-warning'>Seleccione un tipo de certificado</div>";
return;
}

resultado.innerHTML = `

<div class="alert alert-success">
Certificado generado correctamente
</div>

<a href="${tipoCarta}" class="btn btn-success w-100 mb-2" download>
⬇ Descargar certificado
</a>

<button class="btn btn-primary w-100" onclick="enviarCorreo()">
📧 Enviar a correo registrado
</button>

`;

}

function enviarCorreo(){

alert("El certificado ha sido enviado al correo registrado del empleado.");

}

</script>

</body>
</html>
