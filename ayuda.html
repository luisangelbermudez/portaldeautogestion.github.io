<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Ayuda - Portal de Autogestión</title>

<link rel="stylesheet" href="css/normalice.css">
<link rel="stylesheet" href="css/estilo.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">


<style>

body{
background:#f4f4f4;
}

.contacto{
background:white;
padding:40px;
margin-top:40px;
border-radius:10px;
box-shadow:0px 4px 10px rgba(0,0,0,0.1);
}

.contacto h2{
text-align:center;
margin-bottom:10px;
}

.contacto p{
text-align:center;
color:gray;
}

.boton-enviar{
display:block;
margin:auto;
padding:8px 25px;
border-radius:20px;
border:1px solid #ccc;
background:#eee;
}

</style>

</head>

<body>

<nav class="navbar navbar-expand-sm bg-primary navbar-dark mb-5 rounded">
    <div class="container-fluid">
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link active" href="index.html">🏠 Inicio</a>
            </li>
        </ul>
    </div>
</nav>

<div class="container">

<div class="contacto">

<h2><b>Contacta con nosotros</b></h2>

<p>Portal de Autogestión - Soporte al usuario</p>

<br>

<form onsubmit="guardarSolicitud(event)">

<div class="mb-3">
<label class="form-label">Nombre *</label>
<input type="text" id="nombre" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">E-Mail *</label>
<input type="email" id="email" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Mensaje *</label>
<textarea id="mensaje" class="form-control" rows="4" required></textarea>
</div>

<button class="boton-enviar">
Enviar
</button>

</form>

</div>

</div>

<script src="js/script.js"></script>

</body>
</html>
