<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Inicio de Sesión</title>
    <link rel="stylesheet" type="text/css" href="css/normalice.css">
    <link rel="stylesheet" type="text/css" href="css/estilo.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body>

<div class="container mt-3">
    <div class="alert alert-info bg-primary-subtle text-center">
        <h1>Portal de Autogestión</h1>
    </div>

    <nav class="navbar navbar-expand-sm bg-primary navbar-dark mb-5 rounded">
        <div class="container-fluid">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link active" href="index.html">🏠 Inicio</a>
                </li>
            </ul>
        </div>
    </nav>

<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6 text-center">
        <h2>Iniciar sesión</h2>

        <form class="login-box mt-4 p-4 rounded shadow">

            <div class="mb-3">
                <label class="form-label fw-bold">Usuario</label>
                <input class="form-control" type="text" name="usuario" placeholder="usuario">
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Contraseña</label>
                <input class="form-control" type="password" name="password" placeholder="contraseña">
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-bold">Tipo de usuario</label>
                    <select id="rol" class="form-select">
                        <option value="usuario">Empleado</option>
                        <option value="admin">Administrador</option>
                    </select>
            </div>

            <button type="button" onclick="login()" class="btn btn-primary">Ingresar</button>

            <p class="text-center mt-3">
                <a href="ayuda.html" class="text-decoration-none text-primary fw-bold">¿No estás registrado? Contáctanos aquí</a>
            </p>
            
        </form>

    </div>
</div>

<script src="js/script.js"></script>

</body>
</html>
