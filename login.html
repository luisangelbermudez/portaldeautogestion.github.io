<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Inicio de Sesion</title>
    <link rel="stylesheet" type="text/css" href="css/normalice.css">
    <link rel="stylesheet" type="text/css" href="css/estilo.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<div class="container mt-3">
    <div class="alert alert-info bg-primary-subtle text-center">
        <h1>Portal de Autogestión</h1>
    </div>

    <nav class="navbar navbar-expand-sm bg-primary navbar-dark mb-5 rounded">
        <div class="container-fluid">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link active" href="index.html">Inicio</a>
                </li>
            </ul>
        </div>
    </nav>

<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6 text-center">
        <h2>Iniciar sesión</h2>

        <form action="usuario.html" class="login-box mt-4 p-4 rounded shadow">

            <div class="mb-3">
                <label class="form-label fw-bold">Usuario</label>
                <input class="form-control" type="text" name="usuario" placeholder="usuario">
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Contraseña</label>
                <input class="form-control" type="password" name="password" placeholder="contraseña">
            </div>

            <input type="submit" class="btn btn-info w-100 mb-2" value="Ingresar">

            <p class="text-center mt-3">
                <a href="#" class="text-decoration-none">¿Estás Registrado?</a>
            </p>

        </form>

    </div>
</div>
</body>

</html>
